---
- name: Debug | Show current Ansible user
  ansible.builtin.debug:
    msg: "Ansible is using the user: {{ ansible_user_id | default(ansible_env['USER']) }}"
  tags:
    - always

- name: system setup | nix | set install mode
  ansible.builtin.set_fact:
    nix_install_mode: "{{ 'daemon' if nix_daemon_running | default(false) else 'single-user' }}"
  tags:
    - nix
    - system

- name: Download Nix installer script
  ansible.builtin.get_url:
    url: https://nixos.org/nix/install
    dest: /tmp/nix-install.sh
    mode: "0755"
  when: not facts_nix_installed
  tags:
    - nix
    - bootstrap
    - system
    - setup

- name: Install Nix package manager in multi-user mode
  ansible.builtin.command:
    cmd: sh /tmp/nix-install.sh --daemon
  args:
    creates: /nix/var/nix/profiles/default
  when:
    - not facts_nix_installed
    - nix_install_mode == 'daemon'
  tags:
    - nix
    - bootstrap
    - system
    - setup

- name: Install Nix package manager in single-user mode
  ansible.builtin.shell: sh /tmp/nix-install.sh --no-daemon
  args:
    creates: "{{ host_user_home }}/.nix-profile/bin/nix"
    executable: /bin/bash
  become: false
  when:
    - not facts_nix_installed
    - nix_install_mode == 'single-user'
  tags:
    - nix
    - bootstrap
    - system
    - setup

- name: system setup | nix | ensure user nix config directory exists
  ansible.builtin.file:
    path: "{{ host_user_home }}/.config/nix"
    state: directory
    owner: "{{ host_user }}"
    group: "{{ host_user }}"
    mode: "0755"
  when: nix_install_mode == 'single-user'
  tags:
    - nix
    - system
    - config

- name: system setup | nix | enable flakes (daemon)
  ansible.builtin.lineinfile:
    path: /etc/nix/nix.conf
    line: "experimental-features = nix-command flakes"
    create: true
    mode: "0644"
  when: nix_install_mode == 'daemon'
  tags:
    - nix
    - system
    - config

- name: system setup | nix | enable flakes (single-user)
  ansible.builtin.lineinfile:
    path: "{{ host_user_home }}/.config/nix/nix.conf"
    line: "experimental-features = nix-command flakes"
    create: true
    mode: "0644"
    owner: "{{ host_user }}"
    group: "{{ host_user }}"
  when: nix_install_mode == 'single-user'
  tags:
    - nix
    - system
    - config

- name: system setup | nix | set nix system
  ansible.builtin.set_fact:
    nix_system: "{{ 'aarch64-linux' if ansible_architecture in ['aarch64', 'arm64'] else 'x86_64-linux' }}"
  tags:
    - nix
    - system

- name: system setup | nix | verify nix installation
  ansible.builtin.shell: |
    . "{{ nix_profile_script }}"
    if [ "{{ nix_install_mode }}" = "daemon" ]; then
      export NIX_REMOTE=daemon
    fi
    nix --version
  args:
    executable: /bin/bash
  register: nix_version
  changed_when: false
  tags:
    - nix
    - verification

- name: system setup | nix | warn when root runner is required
  ansible.builtin.debug:
    msg: "Using root for store-writing Nix commands because the shared /nix store is root-owned and nix-daemon is not running."
  when: nix_requires_root_runner | default(false)
  tags:
    - nix
    - verification

- name: system setup | nix | create .config/home-manager directory
  ansible.builtin.file:
    path: "{{ host_user_home }}/.config/home-manager"
    state: directory
    owner: "{{ host_user }}"
    group: "{{ host_user }}"
    mode: "0755"
  tags:
    - nix
    - home-manager

- name: system setup | nix | copy home-manager flake
  ansible.builtin.template:
    src: flake.nix.j2
    dest: "{{ host_user_home }}/.config/home-manager/flake.nix"
    owner: "{{ host_user }}"
    group: "{{ host_user }}"
    mode: "0644"
  tags:
    - nix
    - home-manager

- name: system setup | nix | copy home-manager configuration file
  ansible.builtin.template:
    src: home.nix.j2
    dest: "{{ host_user_home }}/.config/home-manager/home.nix"
    owner: "{{ host_user }}"
    group: "{{ host_user }}"
    mode: "0644"
  tags:
    - nix
    - home-manager
    - packages

- name: system setup | nix | generate flake lock
  become_user: "{{ host_user }}"
  ansible.builtin.shell: |
    . "{{ nix_profile_script }}"
    if [ "{{ nix_install_mode }}" = "daemon" ]; then
      export NIX_REMOTE=daemon
    fi
    nix flake lock {{ host_user_home }}/.config/home-manager
  args:
    executable: /bin/bash
    creates: "{{ host_user_home }}/.config/home-manager/flake.lock"
  when: not (nix_requires_root_runner | default(false))
  tags:
    - nix
    - home-manager

- name: system setup | nix | generate flake lock with root runner
  become: true
  ansible.builtin.shell: |
    . "{{ nix_profile_script }}"
    if [ "{{ nix_install_mode }}" = "daemon" ]; then
      export NIX_REMOTE=daemon
    fi
    export HOME="{{ host_user_home }}"
    export USER="{{ host_user }}"
    export LOGNAME="{{ host_user }}"
    nix flake lock {{ host_user_home }}/.config/home-manager
    chown {{ host_user }}:{{ host_user }} {{ host_user_home }}/.config/home-manager/flake.lock
  args:
    executable: /bin/bash
    creates: "{{ host_user_home }}/.config/home-manager/flake.lock"
  when: nix_requires_root_runner | default(false)
  tags:
    - nix
    - home-manager

- name: system setup | nix | apply home-manager config (flake)
  become_user: "{{ host_user }}"
  ansible.builtin.shell: |
    . "{{ nix_profile_script }}"
    if [ "{{ nix_install_mode }}" = "daemon" ]; then
      export NIX_REMOTE=daemon
    fi
    nix run home-manager/{{ home_manager_release }} -- switch --flake {{ host_user_home }}/.config/home-manager
  args:
    executable: /bin/bash
  register: hm_result
  changed_when: "'Activating installPackages' in hm_result.stdout"
  when: not (nix_requires_root_runner | default(false))
  tags:
    - nix
    - home-manager
    - packages

- name: system setup | nix | apply home-manager config with root runner
  become: true
  ansible.builtin.shell: |
    . "{{ nix_profile_script }}"
    if [ "{{ nix_install_mode }}" = "daemon" ]; then
      export NIX_REMOTE=daemon
    fi
    export HOME="{{ host_user_home }}"
    export USER="{{ host_user }}"
    export LOGNAME="{{ host_user }}"
    nix run home-manager/{{ home_manager_release }} -- switch --flake {{ host_user_home }}/.config/home-manager
  args:
    executable: /bin/bash
  register: hm_root_result
  changed_when: >-
    'Activating installPackages' in hm_root_result.stdout or
    'Creating home file links' in hm_root_result.stdout or
    'Starting Home Manager activation' in hm_root_result.stdout
  when: nix_requires_root_runner | default(false)
  tags:
    - nix
    - home-manager
    - packages
