---
- name: Install GitHub CLI (Ubuntu)
  ansible.builtin.apt:
    name: gh
    state: present
    update_cache: true
  when: facts_is_ubuntu
  tags:
    - gh
    - packages

- name: Install GitHub CLI (Arch)
  ansible.builtin.pacman:
    name: github-cli
    state: present
  when: facts_is_arch
  tags:
    - gh
    - packages

- name: Ensure gh config directory exists
  ansible.builtin.file:
    path: "{{ host_user_home }}/.config/gh"
    state: directory
    mode: '0755'
    owner: "{{ host_user }}"
    group: "{{ host_user }}"
  tags:
    - gh
    - config

- name: Copy gh config file
  ansible.builtin.copy:
    src: config.yml
    dest: "{{ host_user_home }}/.config/gh/config.yml"
    mode: '0644'
    owner: "{{ host_user }}"
    group: "{{ host_user }}"
  tags:
    - gh
    - config

- name: Ensure git config directory exists
  ansible.builtin.file:
    path: "{{ host_user_home }}/.config/git"
    state: directory
    mode: '0755'
    owner: "{{ host_user }}"
    group: "{{ host_user }}"
  tags:
    - git
    - config

- name: Write workspace git ignore patterns
  ansible.builtin.copy:
    content: |
      .pi/
    dest: "{{ host_user_home }}/.config/git/workspaces-ignore"
    mode: '0644'
    owner: "{{ host_user }}"
    group: "{{ host_user }}"
  tags:
    - git
    - config

- name: Write workspace git include config
  ansible.builtin.copy:
    content: |
      [core]
          excludesFile = {{ host_user_home }}/.config/git/workspaces-ignore
    dest: "{{ host_user_home }}/.config/git/workspaces.gitconfig"
    mode: '0644'
    owner: "{{ host_user }}"
    group: "{{ host_user }}"
  tags:
    - git
    - config

- name: Ensure workspace-specific git include is configured
  ansible.builtin.blockinfile:
    path: "{{ host_user_home }}/.gitconfig"
    create: true
    owner: "{{ host_user }}"
    group: "{{ host_user }}"
    mode: '0644'
    marker: "# {mark} ANSIBLE MANAGED BLOCK: workspaces git ignore"
    block: |
      [includeIf "gitdir:/workspaces/"]
          path = {{ host_user_home }}/.config/git/workspaces.gitconfig
  tags:
    - git
    - config
