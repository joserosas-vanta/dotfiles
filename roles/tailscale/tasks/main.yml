---
- name: Install Tailscale with pacman (Arch)
  ansible.builtin.pacman:
    name: tailscale
    state: present
  register: tailscale_install
  when: facts_is_arch

- name: Download Tailscale apt key (Ubuntu)
  ansible.builtin.get_url:
    url: "https://pkgs.tailscale.com/stable/ubuntu/{{ ansible_facts['distribution_release'] }}.noarmor.gpg"
    dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
    mode: '0644'
  when: facts_is_ubuntu

- name: Add Tailscale apt repository (Ubuntu)
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg] https://pkgs.tailscale.com/stable/ubuntu {{ ansible_facts['distribution_release'] }} main"
    filename: tailscale
    state: present
  when: facts_is_ubuntu

- name: Install Tailscale with apt (Ubuntu)
  ansible.builtin.apt:
    name: tailscale
    state: present
    update_cache: true
  register: tailscale_install
  when: facts_is_ubuntu

- name: Warn when Tailscale auth key is unavailable
  ansible.builtin.debug:
    msg: "TAILSCALE_AUTHKEY is unavailable; skipping Tailscale login."
  when:
    - not facts_tailscale_authed
    - (lookup('env', 'TAILSCALE_AUTHKEY') | trim | length == 0)
  tags:
    - tailscale
    - network

- name: Enable and start Tailscale service
  ansible.builtin.systemd:
    name: tailscaled
    state: started
    enabled: true
    daemon_reload: true
  become: true
  when: (tailscale_install is defined and tailscale_install is changed) or facts_tailscale_installed | default(false)

- name: Start Tailscale with auth key
  ansible.builtin.command:
    argv:
      - tailscale
      - up
      - >-
        --authkey={{
          (lookup('env', 'TAILSCALE_AUTHKEY') | trim)
        }}
      - "--accept-dns={{ tailscale_accept_dns | ternary('true', 'false') }}"
  register: tailscale_up
  changed_when: tailscale_up.rc == 0
  become: true
  no_log: true  # keep the auth key secure
  when:
    - not facts_tailscale_authed
    - (lookup('env', 'TAILSCALE_AUTHKEY') | trim | length > 0)
  tags:
    - tailscale
    - network

- name: Apply Tailscale DNS preference for authenticated node
  ansible.builtin.command:
    argv:
      - tailscale
      - set
      - "--accept-dns={{ tailscale_accept_dns | ternary('true', 'false') }}"
  become: true
  changed_when: false
  when: facts_tailscale_installed and facts_tailscale_authed
  tags:
    - tailscale
    - network
