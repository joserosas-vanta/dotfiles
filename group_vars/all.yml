default_roles:
  - bash
  - zsh
  - nix
  - git
  - c
  - nvim
  - opencode
  - pi
  - zellij
  - btop
  # - test

exclude_roles:
  - bootstrap

# Default values for system facts
facts_op_installed: false
facts_nix_installed: false
facts_home_manager_installed: false
facts_zsh_installed: false
facts_tailscale_installed: false
facts_tailscale_authed: false
tailscale_accept_dns: true

# Nix/Home Manager releases
nixpkgs_release: "nixos-25.11"
home_manager_release: "release-25.11"

# Media tools releases
media_tools_yt_dlp_version: "2026.02.21"

# Pi defaults
pi_default_provider: "openai-codex"
pi_default_model: "gpt-5.4"
pi_default_thinking_level: "high"
# Keep Ctrl+P model cycling short and predictable across hosts.
pi_enabled_models:
  - "openai-codex/gpt-5.4"
  - "kimi-for-coding"
  - "claude-opus-4-7"
#   - "claude-sonnet-4.5"
#   - "gemini-2.5-pro"
pi_guides_enable_global: true
pi_guides_manage_local_checkout: true
pi_guides_local_checkout_path: "{{ host_user_home }}/pi-guides"
pi_guides_local_checkout_repo: "https://github.com/joserosas-vanta/vpi-guides.git"
pi_guides_local_checkout_ref: "main"
pi_guides_source: "{{ pi_guides_local_checkout_path }}"
pi_guides_git_install_path: "{{ host_user_home }}/.pi/agent/git/github.com/joserosas-vanta/vpi-guides"
pi_guides_git_remote_url: "https://github.com/joserosas-vanta/vpi-guides.git"
pi_guides_git_remote_url_normalized: "https://github.com/joserosas-vanta/vpi-guides"
pi_keybindings:
  app.interrupt:
    - ctrl+x
  app.model.cycleForward: []
  app.session.toggleNamedFilter: []
  app.session.togglePath: []
  tui.editor.cursorDown:
    - down
  tui.editor.cursorUp:
    - up
  tui.editor.pageDown:
    - pageDown
    - ctrl+down
  tui.editor.pageUp:
    - pageUp
    - ctrl+up
  tui.select.down:
    - down
    - ctrl+n
  tui.select.up:
    - up
    - ctrl+p

# Base package lists by distro
packages_common:
  - git
  - curl
  - unzip

packages_arch:
  - python
  - python-pip
  - openssh

packages_ubuntu:
  - python3
  - python3-pip
  - openssh-client
  - openssh-server

# Users facts
facts_host_user_exists: false

# Work VM user defaults
host_user: "vscode"
gh_user: "sillypoise"

# OpenCode guides source-of-truth repo
opencode_guides_repo: "sillypoise/sp-opencode-guides"
opencode_guides_ref: "v0.5.0"
opencode_guides_clone_path: "{{ host_user_home }}/.local/share/opencode-guides"

# System identity
system_hostname: "sp-dev"

# Default work VM home directory
host_user_home: "/home/vscode"

# Define configs
